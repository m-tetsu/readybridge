name: Collect support info (RAG)

# 公的支援情報を定期巡回し、差分があれば PR を起票する（論点③：反映前に人がレビュー）。
# クロール自体は自動。Vectorize への反映（upsert）はマージ後の別ステップで行う想定。

on:
  schedule:
    - cron: '0 21 * * *' # 毎日 06:00 JST（21:00 UTC）
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: npm ci
      - name: Diagnose chusho reachability
        # 能登シードが取れない真因を切り分ける。前回 http=000/size=0（応答ゼロ）だった
        # ため、UAではなく接続レベルの問題（IPv6ブラックホール疑い）を疑って検証する。
        # 失敗してもクロール本体は続行する。
        continue-on-error: true
        run: |
          HOST="https://www.chusho.meti.go.jp"
          URL="$HOST/saigai/r6_noto_jishin/index.html"
          echo "== DNS (A / AAAA) =="
          getent ahosts www.chusho.meti.go.jp || true
          echo "== robots.txt (ホスト到達性) =="
          curl -sS -o /dev/null -m 30 -w 'http=%{http_code} time=%{time_total}s\n' "$HOST/robots.txt" || echo "robots: FAILED"
          echo "== noto page: 既定(自動) =="
          curl -sS -o /dev/null -m 60 -w 'http=%{http_code} time=%{time_total}s size=%{size_download}\n' "$URL" || echo "auto: FAILED"
          echo "== noto page: IPv4強制(-4) =="
          curl -4 -sS -o /dev/null -m 60 -w 'http=%{http_code} time=%{time_total}s size=%{size_download}\n' "$URL" || echo "ipv4: FAILED"
          echo "== noto page: IPv6強制(-6) =="
          curl -6 -sS -o /dev/null -m 60 -w 'http=%{http_code} time=%{time_total}s size=%{size_download}\n' "$URL" || echo "ipv6: FAILED"
      - name: Crawl
        run: npm run crawl
      - name: Create PR on changes
        uses: peter-evans/create-pull-request@v7
        with:
          branch: auto/rag-collected-update
          title: '収集: 支援情報の差分を取り込み'
          commit-message: '収集: 支援情報の差分を取り込み（自動）'
          body: |
            クローラが検知した公的支援情報の差分です。

            - 内容（`data/collected/` の追加・変更）を確認してマージしてください。
            - マージ後、Vectorize への反映（`tools/crawler/upsert.mjs`）を実施します。
            - `data/collected/last-run.json` に新規/更新の要約があります。
          labels: |
            automated
            rag-collect
